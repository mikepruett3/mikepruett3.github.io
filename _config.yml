title:            Nixdevil.com
description:      A haven for Unix & Linux deviants
# put your disqus here
disqus_shortname: 
reading_time:     true # if true, shows the estimated reading time for a post
words_per_minute: 200
# logo:             images/logo.png # logo visible in the topbar
# Your site's domain goes here (eg: //mmistakes.github.io, http://mademistakes.com, etc)
# When testing locally leave blank or use http://localhost:4000

# url: http://aronbordin.com/neo-hpstr-jekyll-theme

# draw your top menu here
# each item must have a title and a url.
#   To list post categories. use type: 'categories'
#   To create sub categories. add a submenu item
# See the example
menu:
  - title: 'Home'
    url: '/'
  - title: 'About'
    url: '/about'
  - title: 'Categories'
    url: '/categories'
    type: 'categories'
  - title: 'Tags'
    url: '/tags'

# Owner/author information
owner:
  name:           Mike Pruett
  site:           http://www.nixdevil.com
  avatar:         uploads/avatar.jpg
  bio:            "Super passionate about Linux, Open Source Software, Beer, and Life. My mission is to dominate the IT world with my charismatic style."
  email:          mpruett@nixdevil.com
  # Twitter nick for use in Twitter cards and follow button.
  #twitter: mikepruett3 # if no twitter in this config, the twitter follow button will be removed
  # GitHub nick for use in follow button in author block.
  github: mikepruett3

# Twitter account associated with the site if different from owner/author twitter account.
# Used in Twitter cards.
#twitter: 

# Social networking links used in author block underneath posts. Update and remove as you like.
social:
  - title: "github"
    url: "https://github.com/mikepruett3"
  - title: "linkedin"
    url: "https://www.linkedin.com/in/mpruett"
  - title: "youtube"
    url: "https://www.youtube.com/channel/UCE4rSpkt95j7wAWjqh4_myQ"
  - title: "reddit"
    url: "https://www.reddit.com/user/Human_Cartographer"
 
# Background image to be tiled on all pages
background:

# Analytics and webmaster tools stuff goes here
google_analytics:
google_verify:
# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone:    America/Chicago
locale:      en_US
future:      true
highlighter: rouge
markdown:    kramdown
gems:
  - jekyll-sitemap
sass:
  sass_dir: _sass
  style: compressed

# https://github.com/mojombo/jekyll/wiki/Permalinks
permalink:   /:categories/:title/

# Amount of post to show on home page
paginate: 5

# if true, shows the floatting share buttons
float_share: False

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  enable_coderay: true

  coderay:
    coderay_line_numbers: nil
    coderay_line_numbers_start: 1
    coderay_tab_width: 4
    coderay_bold_every: 10
    coderay_css: class

# Octopress
# Default extensions
post_ext: md
page_ext: md
# Found in _templates/
post_layout: post
page_layout: page
# Format titles with titlecase?
titlecase: true

include: [".htaccess"]
exclude: ["lib", "config.rb", "Capfile", "config", "Gemfile", "Gemfile.lock", "README.md", "LICENSE", "log", "Rakefile", "Rakefile.rb", "tmp", "less", "*.sublime-project", "*.sublime-workspace", "test", "spec", "Gruntfile.js", "package.json", "node_modules"]
gems: [jekyll-paginate]
